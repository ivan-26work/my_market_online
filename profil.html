<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MonMarché - Mon profil</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0f1a;
            color: #eef2ff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            background: #0e1a26;
            border-radius: 30px;
            border: 1px solid #2a3a4a;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #5a9eff;
        }

        .card {
            background: #0e1a26;
            border: 1px solid #2a3a4a;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #5a9eff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #2a3a4a;
        }

        .info-label {
            width: 120px;
            font-weight: 600;
            color: #8a9aaa;
        }

        .info-value {
            flex: 1;
            color: #eef2ff;
            word-break: break-word;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px;
            display: block;
            border: 2px solid #5a9eff;
        }

        .btn {
            background: #5a9eff;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:hover {
            background: #3a7ecc;
        }

        .btn-secondary {
            background: #1a2a3a;
            border: 1px solid #2a3a4a;
        }

        .btn-secondary:hover {
            background: #2a3a4a;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a3a4a;
            border-top-color: #5a9eff;
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #2a1a1a;
            border-left: 4px solid #ff4d4d;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-user-circle"></i> Mon profil</h1>
    </div>

    <div id="profileContent">
        <div class="loading">
            <div class="spinner"></div>
            <p>Chargement de vos informations...</p>
        </div>
    </div>

    <div class="button-group">
        <a href="index.html" class="btn"><i class="fas fa-store"></i> Mon marché</a>
        <button id="logoutBtn" class="btn btn-secondary"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    (async function() {
        // Configuration Supabase
        const SUPABASE_URL = 'https://emcsigvlopntwbfkkjkh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtY3NpZ3Zsb3BudHdiZmtramtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODE5MTgsImV4cCI6MjA5NDQ1NzkxOH0.YwYoV-azL3WEFtHoh4yoF7xTLrOwZILKCzJrGPsCs6I';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const container = document.getElementById('profileContent');
        
        async function loadProfile() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (!session) {
                    container.innerHTML = `
                        <div class="error">
                            <i class="fas fa-exclamation-circle"></i>
                            <p>Vous n'êtes pas connecté.</p>
                            <a href="auth.html" class="btn" style="margin-top: 12px;">Se connecter</a>
                        </div>
                    `;
                    return;
                }
                
                const user = session.user;
                
                const { data: marketInfo } = await supabase
                    .from('markets')
                    .select('*')
                    .eq('id', user.id)
                    .single();
                
                container.innerHTML = `
                    ${marketInfo?.avatar_url ? `<img src="${marketInfo.avatar_url}" class="avatar" alt="Avatar">` : ''}
                    <div class="card">
                        <h2><i class="fas fa-user"></i> Informations du compte</h2>
                        <div class="info-row">
                            <div class="info-label">Email</div>
                            <div class="info-value">${user.email || '-'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">ID utilisateur</div>
                            <div class="info-value">${user.id.substring(0, 20)}...</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Pseudo</div>
                            <div class="info-value">${user.user_metadata?.username || '-'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Dernière connexion</div>
                            <div class="info-value">${user.last_sign_in_at ? new Date(user.last_sign_in_at).toLocaleString() : '-'}</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h2><i class="fas fa-store"></i> Informations du marché</h2>
                        <div class="info-row">
                            <div class="info-label">Nom du marché</div>
                            <div class="info-value">${marketInfo?.market_name || 'Non renseigné'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Propriétaire</div>
                            <div class="info-value">${marketInfo?.owner_name || 'Non renseigné'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Téléphone</div>
                            <div class="info-value">${marketInfo?.phone || 'Non renseigné'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Email public</div>
                            <div class="info-value">${marketInfo?.public_email || 'Non renseigné'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Ville</div>
                            <div class="info-value">${marketInfo?.city || 'Non renseigné'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">WhatsApp</div>
                            <div class="info-value">${marketInfo?.whatsapp || 'Non renseigné'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Description</div>
                            <div class="info-value">${marketInfo?.description ? marketInfo.description.substring(0, 150) + '...' : 'Non renseignée'}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Membre depuis</div>
                            <div class="info-value">${marketInfo?.created_at ? new Date(marketInfo.created_at).toLocaleDateString() : '-'}</div>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Erreur:', error);
                container.innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Erreur: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'auth.html';
        }
        
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        await loadProfile();
    })();
</script>

</body>
</html>
