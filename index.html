<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MonMarché - Mes produits</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <!-- HEADER -->
    <header class="main-header" id="mainHeader">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Rechercher un produit, prix...">
        </div>
        <a href="settings.html" class="icon-btn">
            <i class="fas fa-cog"></i>
        </a>
    </header>

    <!-- BANNIÈRE D'AVERTISSEMENT (supprimable) -->
    <div id="warningBanner" class="warning-banner" style="display: none;">
        <div class="warning-content">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="warningMessage">Votre numéro WhatsApp est invalide ou manquant. Les clients ne pourront pas vous contacter.</span>
        </div>
        <button id="closeWarningBtn" class="warning-close">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <!-- ANIMATION DE CHARGEMENT CENTRÉE -->
    <div id="loadingAnimation" class="loading-animation">
        <div class="loader-icon">
            <i class="fas fa-store"></i>
        </div>
        <p>Chargement de votre marché...</p>
    </div>

    <!-- FILTRES CATÉGORIES -->
    <div class="filters-container" id="filtersContainer" style="display:none;">
        <div class="filters-scroll" id="filtersScroll"></div>
    </div>

    <!-- GRILLE PRODUITS (cachée au départ) -->
    <main class="main-content" id="mainContent" style="display: none;">
        <div id="productsGrid" class="products-grid"></div>
    </main>

    <!-- FOOTER -->
    <footer class="main-footer">
        <a href="createproduct.html" class="fab-btn">
            <i class="fas fa-plus"></i>
        </a>
    </footer>

    <!-- MODALE CHARGEMENT -->
    <div id="loadingModal" class="modal-loading" style="display: none;">
        <div class="modal-card">
            <div class="spinner"></div>
            <p id="modalStatus">Chargement...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/index.js"></script>
</body>
</html>
