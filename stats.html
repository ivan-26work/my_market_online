<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MonMarché - Statistiques avancées</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0f1a;
            color: #eef2ff;
            min-height: 100vh;
            padding-bottom: 30px;
        }

        /* Header */
        .main-header {
            position: sticky;
            top: 16px;
            z-index: 100;
            background: #0e1a26;
            border-radius: 30px;
            border: 1px solid #2a3a4a;
            height: 60px;
            margin: 16px 16px 0 16px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            background: #1a2a3a;
            border: 1px solid #2a3a4a;
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            color: #eef2ff;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #5a9eff;
            color: white;
            border-color: #5a9eff;
        }

        .main-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            flex: 1;
        }

        .refresh-btn {
            background: #1a2a3a;
            border: 1px solid #2a3a4a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #eef2ff;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #5a9eff;
            color: white;
        }

        /* Contenu */
        .main-content {
            padding: 20px 16px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Stats rapides */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #0e1a26;
            border: 1px solid #2a3a4a;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #5a9eff;
            transform: translateY(-2px);
        }

        .stat-card i {
            font-size: 1.8rem;
            color: #5a9eff;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #eef2ff;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #8a9aaa;
            margin-top: 4px;
        }

        .stat-trend {
            font-size: 0.7rem;
            margin-top: 6px;
        }

        .trend-up { color: #4ade80; }
        .trend-down { color: #ff4d4d; }
        .trend-neutral { color: #ffaa44; }

        /* Sections */
        .section {
            background: #0e1a26;
            border: 1px solid #2a3a4a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .section h4 {
            font-size: 1rem;
            font-weight: 600;
            color: #5a9eff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Alertes */
        .alert-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alert-item {
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a2a3a;
        }

        .alert-item.warning {
            border-left: 3px solid #ffaa44;
        }

        .alert-item.danger {
            border-left: 3px solid #ff4d4d;
        }

        .alert-item.info {
            border-left: 3px solid #5a9eff;
        }

        .alert-item i {
            font-size: 1.2rem;
        }

        .alert-item.warning i { color: #ffaa44; }
        .alert-item.danger i { color: #ff4d4d; }
        .alert-item.info i { color: #5a9eff; }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .alert-desc {
            font-size: 0.7rem;
            color: #8a9aaa;
            margin-top: 2px;
        }

        /* Classements */
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: #1a2a3a;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .ranking-item:hover {
            background: #1a2a3a;
            transform: translateX(4px);
        }

        .rank-medal {
            width: 45px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .rank-medal i.fa-trophy { color: #ffaa44; }
        .rank-medal i.fa-medal { color: #c0c0c0; }

        .product-name {
            flex: 1;
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price {
            font-size: 0.8rem;
            color: #5a9eff;
            font-weight: 600;
            width: 100px;
            text-align: right;
        }

        .stat-numbers {
            display: flex;
            gap: 16px;
            width: 100px;
            justify-content: flex-end;
        }

        .stat-numbers span {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .stat-numbers .views { color: #5a9eff; }
        .stat-numbers .clicks { color: #4ade80; }

        .bar-container {
            width: 120px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bar {
            flex: 1;
            height: 6px;
            background: #2a3a4a;
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: #5a9eff;
            border-radius: 3px;
        }

        .bar-fill.clicks {
            background: #4ade80;
        }

        /* Graphiques */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: #0e1a26;
            border: 1px solid #2a3a4a;
            border-radius: 20px;
            padding: 16px;
        }

        .chart-card h4 {
            font-size: 0.85rem;
            color: #8a9aaa;
            margin-bottom: 16px;
        }

        canvas {
            max-height: 200px;
        }

        /* Loader */
        .loader {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a3a4a;
            border-top-color: #5a9eff;
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a2a3a;
            color: #eef2ff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #2a3a4a;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 200;
            white-space: nowrap;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: #4ade80; color: #4ade80; }
        .toast.error { border-color: #ff4d4d; color: #ff4d4d; }

        @media (max-width: 768px) {
            .ranking-item {
                flex-wrap: wrap;
            }
            .product-price {
                width: auto;
                margin-left: auto;
            }
            .bar-container {
                width: 100%;
                margin-top: 6px;
                margin-left: 45px;
            }
            .stat-numbers {
                width: 100%;
                margin-left: 45px;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="main-header">
        <a href="settings.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
        <h3>Statistiques avancées</h3>
        <button id="refreshBtn" class="refresh-btn">
            <i class="fas fa-sync-alt"></i>
        </button>
    </header>

    <main class="main-content" id="statsContent">
        <div class="loader">
            <div class="spinner"></div>
            <p>Chargement des statistiques...</p>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://emcsigvlopntwbfkkjkh.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtY3NpZ3Zsb3BudHdiZmtramtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODE5MTgsImV4cCI6MjA5NDQ1NzkxOH0.YwYoV-azL3WEFtHoh4yoF7xTLrOwZILKCzJrGPsCs6I';

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const statsContent = document.getElementById('statsContent');
            const refreshBtn = document.getElementById('refreshBtn');
            const toastEl = document.getElementById('toast');

            let currentUserId = null;
            let allProducts = [];
            let productStats = {};

            function showToast(message, type = 'info') {
                toastEl.textContent = message;
                toastEl.className = `toast ${type} show`;
                setTimeout(() => toastEl.className = 'toast', 3000);
            }

            async function checkSession() {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (!session) { window.location.href = 'auth.html'; return false; }
                    currentUserId = session.user.id;
                    return true;
                } catch {
                    window.location.href = 'auth.html';
                    return false;
                }
            }

            async function loadData() {
                showLoading();
                try {
                    // Charger les produits
                    const { data: products, error: productsError } = await supabase
                        .from('products')
                        .select('*')
                        .eq('user_id', currentUserId)
                        .order('created_at', { ascending: false });

                    if (productsError) throw productsError;
                    allProducts = products || [];

                    // Charger les stats des produits
                    const productIds = allProducts.map(p => p.id);
                    if (productIds.length > 0) {
                        const { data: stats, error: statsError } = await supabase
                            .from('product_stats')
                            .select('*')
                            .in('product_id', productIds);

                        if (statsError) throw statsError;

                        // Aggréger les stats par produit
                        productStats = {};
                        for (const stat of stats || []) {
                            if (!productStats[stat.product_id]) {
                                productStats[stat.product_id] = { views: 0, clicks: 0 };
                            }
                            productStats[stat.product_id].views += stat.view_count || 0;
                            productStats[stat.product_id].clicks += stat.click_count || 0;
                        }
                    }

                    renderStats();

                } catch (err) {
                    console.error('Erreur:', err);
                    showToast('Erreur chargement des données', 'error');
                } finally {
                    hideLoading();
                }
            }

            function getProductViews(productId) {
                return productStats[productId]?.views || 0;
            }

            function getProductClicks(productId) {
                return productStats[productId]?.clicks || 0;
            }

            function getTotalViews() {
                return allProducts.reduce((sum, p) => sum + getProductViews(p.id), 0);
            }

            function getTotalClicks() {
                return allProducts.reduce((sum, p) => sum + getProductClicks(p.id), 0);
            }

            function getConversionRate() {
                const views = getTotalViews();
                const clicks = getTotalClicks();
                if (views === 0) return 0;
                return ((clicks / views) * 100).toFixed(1);
            }

            function getTopProductsByViews(limit = 5) {
                return [...allProducts]
                    .sort((a, b) => getProductViews(b.id) - getProductViews(a.id))
                    .slice(0, limit);
            }

            function getTopProductsByClicks(limit = 5) {
                return [...allProducts]
                    .sort((a, b) => getProductClicks(b.id) - getProductClicks(a.id))
                    .slice(0, limit);
            }

            function getLowestProducts() {
                const withClicks = allProducts.filter(p => getProductClicks(p.id) === 0 && getProductViews(p.id) > 0);
                return withClicks.slice(0, 3);
            }

            function getInactiveProducts() {
                return allProducts.filter(p => p.active === false);
            }

            function getProductsWithoutImage() {
                return allProducts.filter(p => !p.images || p.images.length === 0 || !p.images[0]);
            }

            function getCategoryStats() {
                const stats = {};
                allProducts.forEach(p => {
                    const cat = p.category || 'Non classé';
                    if (!stats[cat]) stats[cat] = { count: 0, views: 0, clicks: 0 };
                    stats[cat].count++;
                    stats[cat].views += getProductViews(p.id);
                    stats[cat].clicks += getProductClicks(p.id);
                });
                return Object.entries(stats).sort((a, b) => b[1].views - a[1].views);
            }

            function getProductsByDay(days = 7) {
                const result = {};
                for (let i = days - 1; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    const dateStr = date.toISOString().split('T')[0];
                    result[dateStr] = { products: 0, views: 0, clicks: 0 };
                }
                return result;
            }

            function formatPrice(price) {
                return new Intl.NumberFormat('fr-FR').format(price);
            }

            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function getMaxValue(products, type) {
                if (products.length === 0) return 0;
                return Math.max(...products.map(p => type === 'views' ? getProductViews(p.id) : getProductClicks(p.id)));
            }

            function showLoading() {
                statsContent.innerHTML = `<div class="loader"><div class="spinner"></div><p>Chargement des statistiques...</p></div>`;
            }

            function hideLoading() {}

            let charts = {};

            function renderStats() {
                const totalProducts = allProducts.length;
                const activeProducts = allProducts.filter(p => p.active !== false).length;
                const totalViews = getTotalViews();
                const totalClicks = getTotalClicks();
                const conversionRate = getConversionRate();
                const topByViews = getTopProductsByViews(5);
                const topByClicks = getTopProductsByClicks(5);
                const lowestProducts = getLowestProducts();
                const inactiveProducts = getInactiveProducts();
                const productsWithoutImage = getProductsWithoutImage();
                const categoryStats = getCategoryStats();
                const maxViews = getMaxValue(topByViews, 'views');
                const maxClicks = getMaxValue(topByClicks, 'clicks');

                // Alertes
                const alerts = [];
                if (inactiveProducts.length > 0) {
                    alerts.push({ type: 'warning', icon: 'fa-eye-slash', title: `${inactiveProducts.length} produit(s) désactivé(s)`, desc: 'Ces produits ne sont pas visibles par les acheteurs' });
                }
                if (productsWithoutImage.length > 0) {
                    alerts.push({ type: 'danger', icon: 'fa-image-slash', title: `${productsWithoutImage.length} produit(s) sans image`, desc: 'Ajoutez des images pour améliorer l\'attractivité' });
                }
                if (lowestProducts.length > 0) {
                    alerts.push({ type: 'info', icon: 'fa-chart-line', title: `${lowestProducts.length} produit(s) sans aucun clic`, desc: 'Ces produits n\'ont jamais été commandés' });
                }
                if (totalViews === 0) {
                    alerts.push({ type: 'warning', icon: 'fa-eye-slash', title: 'Aucune vue sur vos produits', desc: 'Partagez votre boutique pour attirer des clients' });
                }

                const topViewsHtml = topByViews.map((product, idx) => {
                    const views = getProductViews(product.id);
                    const barWidth = maxViews > 0 ? (views / maxViews) * 100 : 0;
                    const medal = idx === 0 ? '<i class="fas fa-trophy"></i>' : (idx === 1 ? '<i class="fas fa-medal"></i>' : (idx === 2 ? '<i class="fas fa-medal"></i>' : `${idx + 1}`));
                    return `
                        <div class="ranking-item">
                            <div class="rank-medal">${medal}</div>
                            <div class="product-name">${escapeHtml(product.name)}</div>
                            <div class="product-price">${formatPrice(product.price)} FCFA</div>
                            <div class="bar-container">
                                <div class="bar"><div class="bar-fill" style="width: ${barWidth}%;"></div></div>
                                <span class="views">${views} vues</span>
                            </div>
                        </div>
                    `;
                }).join('');

                const topClicksHtml = topByClicks.map((product, idx) => {
                    const clicks = getProductClicks(product.id);
                    const barWidth = maxClicks > 0 ? (clicks / maxClicks) * 100 : 0;
                    const medal = idx === 0 ? '<i class="fas fa-trophy"></i>' : (idx === 1 ? '<i class="fas fa-medal"></i>' : (idx === 2 ? '<i class="fas fa-medal"></i>' : `${idx + 1}`));
                    return `
                        <div class="ranking-item">
                            <div class="rank-medal">${medal}</div>
                            <div class="product-name">${escapeHtml(product.name)}</div>
                            <div class="product-price">${formatPrice(product.price)} FCFA</div>
                            <div class="bar-container">
                                <div class="bar"><div class="bar-fill clicks" style="width: ${barWidth}%;"></div></div>
                                <span class="clicks">${clicks} commandes</span>
                            </div>
                        </div>
                    `;
                }).join('');

                const alertsHtml = alerts.length > 0 
                    ? alerts.map(alert => `
                        <div class="alert-item ${alert.type}">
                            <i class="fas ${alert.icon}"></i>
                            <div class="alert-content">
                                <div class="alert-title">${alert.title}</div>
                                <div class="alert-desc">${alert.desc}</div>
                            </div>
                        </div>
                    `).join('')
                    : '<div class="alert-item info"><i class="fas fa-check-circle"></i><div class="alert-content"><div class="alert-title">Tout va bien !</div><div class="alert-desc">Aucun problème détecté sur vos produits</div></div></div>';

                const lowestHtml = lowestProducts.length > 0
                    ? lowestProducts.map(p => `
                        <div class="ranking-item">
                            <div class="rank-medal"><i class="fas fa-chart-line"></i></div>
                            <div class="product-name">${escapeHtml(p.name)}</div>
                            <div class="product-price">${formatPrice(p.price)} FCFA</div>
                            <div class="stat-numbers"><span class="views">${getProductViews(p.id)} vues</span><span class="clicks">${getProductClicks(p.id)} commandes</span></div>
                        </div>
                    `).join('')
                    : '<div style="padding: 12px; text-align: center; color: #8a9aaa;">Tous vos produits ont reçu au moins un clic !</div>';

                statsContent.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card"><i class="fas fa-boxes"></i><div class="stat-value">${totalProducts}</div><div class="stat-label">Total produits</div><div class="stat-trend trend-up">${activeProducts} actifs</div></div>
                        <div class="stat-card"><i class="fas fa-eye"></i><div class="stat-value">${totalViews}</div><div class="stat-label">Vues totales</div></div>
                        <div class="stat-card"><i class="fab fa-whatsapp"></i><div class="stat-value">${totalClicks}</div><div class="stat-label">Commandes WhatsApp</div></div>
                        <div class="stat-card"><i class="fas fa-chart-line"></i><div class="stat-value">${conversionRate}%</div><div class="stat-label">Taux de conversion</div></div>
                    </div>

                    <div class="section"><h4><i class="fas fa-exclamation-triangle"></i> Alertes & recommandations</h4><div class="alert-list">${alertsHtml}</div></div>

                    <div class="charts-row">
                        <div class="chart-card"><h4><i class="fas fa-chart-bar"></i> Top produits (vues)</h4><div class="ranking-list">${topViewsHtml || '<p>Aucune donnée</p>'}</div></div>
                        <div class="chart-card"><h4><i class="fab fa-whatsapp"></i> Top produits (commandes)</h4><div class="ranking-list">${topClicksHtml || '<p>Aucune donnée</p>'}</div></div>
                    </div>

                    <div class="section"><h4><i class="fas fa-chart-pie"></i> Performance par catégorie</h4><div id="categoryChartContainer" style="height: 200px;"><canvas id="categoryChart"></canvas></div></div>

                    <div class="section"><h4><i class="fas fa-chart-line"></i> Produits à booster (peu ou pas de commandes)</h4><div class="ranking-list">${lowestHtml}</div></div>
                `;

                // Graphique catégories
                const ctx = document.getElementById('categoryChart').getContext('2d');
                if (charts.categoryChart) charts.categoryChart.destroy();
                charts.categoryChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: categoryStats.map(c => c[0]),
                        datasets: [
                            { label: 'Vues', data: categoryStats.map(c => c[1].views), backgroundColor: '#5a9eff', borderRadius: 8 },
                            { label: 'Commandes', data: categoryStats.map(c => c[1].clicks), backgroundColor: '#4ade80', borderRadius: 8 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#eef2ff' } } }, scales: { y: { grid: { color: '#2a3a4a' }, ticks: { color: '#eef2ff' } }, x: { ticks: { color: '#eef2ff' } } } }
                });
            }

            async function init() {
                const ok = await checkSession();
                if (ok) {
                    await loadData();
                    refreshBtn.onclick = () => loadData();
                }
            }

            init();
        })();
    </script>
</body>
</html>
