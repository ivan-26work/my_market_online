<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MonMarché - Statistiques</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0f1a;
            color: #eef2ff;
            min-height: 100vh;
            padding-bottom: 30px;
        }

        /* Header */
        .main-header {
            position: sticky;
            top: 16px;
            z-index: 100;
            background: #0e1a26;
            border-radius: 30px;
            border: 1px solid #2a3a4a;
            height: 60px;
            margin: 16px 16px 0 16px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            background: #1a2a3a;
            border: 1px solid #2a3a4a;
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            color: #eef2ff;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #5a9eff;
            color: white;
            border-color: #5a9eff;
        }

        .main-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            flex: 1;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #1a2a3a;
            border: 1px solid #2a3a4a;
        }

        .status-badge.active {
            background: #1a2a1a;
            border-color: #4ade80;
            color: #4ade80;
        }

        .status-badge.inactive {
            background: #2a1a1a;
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        /* Contenu */
        .main-content {
            padding: 20px 16px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Grille stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #0e1a26;
            border: 1px solid #2a3a4a;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }

        .stat-card i {
            font-size: 1.8rem;
            color: #5a9eff;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #eef2ff;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #8a9aaa;
            margin-top: 4px;
        }

        /* Section commune */
        .section {
            background: #0e1a26;
            border: 1px solid #2a3a4a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .section h4 {
            font-size: 1rem;
            font-weight: 600;
            color: #5a9eff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Classement TOP 5 */
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: #1a2a3a;
            border-radius: 12px;
        }

        .rank-medal {
            width: 40px;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .rank-medal i.fa-trophy { color: #ffaa44; }
        .rank-medal i.fa-medal { color: #c0c0c0; }
        .rank-medal i.fa-medal { color: #cd7f32; }

        .rank-number {
            width: 40px;
            font-weight: 700;
            color: #8a9aaa;
        }

        .product-name {
            flex: 1;
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price {
            font-size: 0.8rem;
            color: #5a9eff;
            font-weight: 600;
            width: 100px;
            text-align: right;
        }

        .clicks-bar-container {
            width: 120px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clicks-bar {
            flex: 1;
            height: 6px;
            background: #2a3a4a;
            border-radius: 3px;
            overflow: hidden;
        }

        .clicks-bar-fill {
            height: 100%;
            background: #5a9eff;
            border-radius: 3px;
        }

        .clicks-count {
            font-size: 0.75rem;
            font-weight: 600;
            color: #ffaa44;
            min-width: 45px;
            text-align: right;
        }

        /* Catégories */
        .category-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #1a2a3a;
        }

        .category-name {
            width: 120px;
            font-weight: 500;
        }

        .category-bar-container {
            flex: 1;
            height: 8px;
            background: #2a3a4a;
            border-radius: 4px;
            overflow: hidden;
        }

        .category-bar-fill {
            height: 100%;
            background: #5a9eff;
            border-radius: 4px;
        }

        .category-count {
            width: 50px;
            text-align: right;
            font-weight: 600;
            color: #5a9eff;
        }

        /* Produit moins cliqué */
        .lowest-product {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 12px;
            background: #1a2a3a;
            border-radius: 12px;
        }

        .lowest-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .btn-promote {
            background: transparent;
            border: 1px solid #ffaa44;
            border-radius: 30px;
            padding: 6px 16px;
            color: #ffaa44;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-promote:hover {
            background: #ffaa44;
            color: #1a2a3a;
        }

        /* Featured product */
        .featured-product {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #1a2a3a;
            border-radius: 12px;
            border-left: 3px solid #ffaa44;
        }

        /* Loader */
        .loader {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a3a4a;
            border-top-color: #5a9eff;
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a2a3a;
            color: #eef2ff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #2a3a4a;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 200;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { border-color: #4ade80; color: #4ade80; }
        .toast.error { border-color: #ff4d4d; color: #ff4d4d; }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .ranking-item {
                flex-wrap: wrap;
            }

            .product-price {
                width: auto;
                margin-left: auto;
            }

            .clicks-bar-container {
                width: 100%;
                margin-top: 6px;
                margin-left: 40px;
            }

            .lowest-product {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="main-header">
        <a href="settings.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
        <h3>Statistiques</h3>
        <div id="marketStatusBadge" class="status-badge">Chargement...</div>
    </header>

    <main class="main-content" id="statsContent">
        <div class="loader">
            <div class="spinner"></div>
            <p>Chargement des statistiques...</p>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://emcsigvlopntwbfkkjkh.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtY3NpZ3Zsb3BudHdiZmtramtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODE5MTgsImV4cCI6MjA5NDQ1NzkxOH0.YwYoV-azL3WEFtHoh4yoF7xTLrOwZILKCzJrGPsCs6I';

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            let currentUserId = null;
            let allProducts = [];
            let marketActive = true;

            const statsContent = document.getElementById('statsContent');
            const marketStatusBadge = document.getElementById('marketStatusBadge');
            const toastEl = document.getElementById('toast');

            function showToast(message, type = 'info') {
                toastEl.textContent = message;
                toastEl.className = `toast ${type} show`;
                setTimeout(() => { toastEl.className = 'toast'; }, 3000);
            }

            async function checkSession() {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (!session) { window.location.href = 'auth.html'; return false; }
                    currentUserId = session.user.id;
                    return true;
                } catch {
                    window.location.href = 'auth.html';
                    return false;
                }
            }

            async function loadMarketStatus() {
                const { data, error } = await supabase
                    .from('markets')
                    .select('market_active')
                    .eq('id', currentUserId)
                    .single();
                
                if (!error && data) {
                    marketActive = data.market_active !== false;
                    marketStatusBadge.textContent = marketActive ? '✅ Actif' : '🔴 Désactivé';
                    marketStatusBadge.className = marketActive ? 'status-badge active' : 'status-badge inactive';
                } else {
                    marketActive = true;
                    marketStatusBadge.textContent = '✅ Actif';
                    marketStatusBadge.className = 'status-badge active';
                }
            }

            async function loadProducts() {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .eq('user_id', currentUserId);
                
                if (error) throw error;
                allProducts = data || [];
            }

            function getTopProducts(limit = 5) {
                return [...allProducts]
                    .sort((a, b) => (b.click_count || 0) - (a.click_count || 0))
                    .slice(0, limit);
            }

            function getLowestProduct() {
                const withClicks = allProducts.filter(p => (p.click_count || 0) > 0);
                if (withClicks.length === 0) return null;
                return withClicks.reduce((min, p) => (p.click_count || 0) < (min.click_count || 0) ? p : min, withClicks[0]);
            }

            function getFeaturedProduct() {
                return allProducts.find(p => p.featured === true);
            }

            function getCategoryStats() {
                const stats = {};
                allProducts.forEach(p => {
                    const cat = p.category || 'Non classé';
                    stats[cat] = (stats[cat] || 0) + 1;
                });
                return Object.entries(stats).sort((a, b) => b[1] - a[1]);
            }

            function formatPrice(price) {
                return new Intl.NumberFormat('fr-FR').format(price);
            }

            function getMaxClicks() {
                if (allProducts.length === 0) return 0;
                return Math.max(...allProducts.map(p => p.click_count || 0));
            }

            function renderStats() {
                const totalProducts = allProducts.length;
                const activeProducts = allProducts.filter(p => p.active !== false).length;
                const inactiveProducts = totalProducts - activeProducts;
                const totalClicks = allProducts.reduce((sum, p) => sum + (p.click_count || 0), 0);
                const maxClicks = getMaxClicks();
                const topProducts = getTopProducts(5);
                const lowestProduct = getLowestProduct();
                const featuredProduct = getFeaturedProduct();
                const categoryStats = getCategoryStats();

                const rankIcons = ['🥇', '🥈', '🥉', '4', '5'];

                const topProductsHtml = topProducts.map((product, idx) => {
                    const clicks = product.click_count || 0;
                    const barWidth = maxClicks > 0 ? (clicks / maxClicks) * 100 : 0;
                    const rankDisplay = idx < 3 
                        ? `<i class="fas ${idx === 0 ? 'fa-trophy' : 'fa-medal'}"></i>`
                        : `<span class="rank-number">${rankIcons[idx]}</span>`;
                    return `
                        <div class="ranking-item">
                            <div class="rank-medal">${rankDisplay}</div>
                            <div class="product-name">${escapeHtml(product.name)}</div>
                            <div class="product-price">${formatPrice(product.price)} FCFA</div>
                            <div class="clicks-bar-container">
                                <div class="clicks-bar">
                                    <div class="clicks-bar-fill" style="width: ${barWidth}%;"></div>
                                </div>
                                <div class="clicks-count">${clicks} clics</div>
                            </div>
                        </div>
                    `;
                }).join('');

                const categoryMax = Math.max(...categoryStats.map(c => c[1]), 1);
                const categoriesHtml = categoryStats.map(([name, count]) => {
                    const barWidth = (count / categoryMax) * 100;
                    return `
                        <div class="category-item">
                            <div class="category-name">${escapeHtml(name)}</div>
                            <div class="category-bar-container">
                                <div class="category-bar-fill" style="width: ${barWidth}%;"></div>
                            </div>
                            <div class="category-count">${count}</div>
                        </div>
                    `;
                }).join('');

                const lowestHtml = lowestProduct ? `
                    <div class="lowest-product">
                        <div class="lowest-info">
                            <i class="fas fa-chart-line" style="color: #ffaa44;"></i>
                            <strong>${escapeHtml(lowestProduct.name)}</strong>
                            <span style="color: #8a9aaa;">${lowestProduct.click_count || 0} clics</span>
                        </div>
                        <button class="btn-promote" data-id="${lowestProduct.id}">
                            <i class="fas fa-arrow-up"></i> Mettre en avant
                        </button>
                    </div>
                ` : '<p style="color:#8a9aaa;">Aucun produit avec des clics</p>';

                const featuredHtml = featuredProduct ? `
                    <div class="featured-product">
                        <div>
                            <i class="fas fa-star" style="color: #ffaa44;"></i>
                            <strong>${escapeHtml(featuredProduct.name)}</strong>
                            <span style="color: #8a9aaa; margin-left: 8px;">${featuredProduct.click_count || 0} clics</span>
                        </div>
                        <span style="font-size:0.7rem; color:#ffaa44;">⭐ À la une</span>
                    </div>
                ` : '<p style="color:#8a9aaa;">Aucun produit à la une</p>';

                statsContent.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fas fa-boxes"></i>
                            <div class="stat-value">${totalProducts}</div>
                            <div class="stat-label">Total produits</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-check-circle"></i>
                            <div class="stat-value">${activeProducts}</div>
                            <div class="stat-label">Produits actifs</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-ban"></i>
                            <div class="stat-value">${inactiveProducts}</div>
                            <div class="stat-label">Produits inactifs</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-eye"></i>
                            <div class="stat-value">${totalClicks}</div>
                            <div class="stat-label">Total clics</div>
                        </div>
                    </div>

                    <div class="section">
                        <h4><i class="fas fa-trophy"></i> TOP 5 des produits les plus cliqués</h4>
                        <div class="ranking-list">
                            ${topProductsHtml || '<p>Aucun produit</p>'}
                        </div>
                    </div>

                    <div class="section">
                        <h4><i class="fas fa-chart-pie"></i> Répartition par catégorie</h4>
                        ${categoriesHtml || '<p>Aucune catégorie</p>'}
                    </div>

                    <div class="section">
                        <h4><i class="fas fa-star"></i> Produit à la une</h4>
                        ${featuredHtml}
                    </div>

                    <div class="section">
                        <h4><i class="fas fa-chart-line"></i> Produit le moins cliqué</h4>
                        ${lowestHtml}
                    </div>
                `;

                document.querySelectorAll('.btn-promote').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const productId = btn.getAttribute('data-id');
                        await promoteProduct(productId);
                    });
                });
            }

            async function promoteProduct(productId) {
                showLoading();
                try {
                    await supabase
                        .from('products')
                        .update({ featured: false })
                        .eq('user_id', currentUserId);
                    
                    const { error } = await supabase
                        .from('products')
                        .update({ featured: true })
                        .eq('id', productId)
                        .eq('user_id', currentUserId);
                    
                    if (error) throw error;
                    showToast('Produit mis en avant !', 'success');
                    await loadProducts();
                    renderStats();
                } catch (err) {
                    showToast('Erreur: ' + err.message, 'error');
                }
                hideLoading();
            }

            function showLoading() {
                statsContent.innerHTML = `
                    <div class="loader">
                        <div class="spinner"></div>
                        <p>Chargement des statistiques...</p>
                    </div>
                `;
            }

            function hideLoading() {}

            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            async function init() {
                const ok = await checkSession();
                if (!ok) return;
                await loadMarketStatus();
                await loadProducts();
                renderStats();
            }

            init();
        })();
    </script>
</body>
</html>
