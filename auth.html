<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MonMarché - Authentification</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="page">
    <!-- HEADER : rectangle 60px avec deux boutons -->
    <div class="header">
        <div class="tab-container">
            <button class="tab-btn active" data-tab="login">Connexion</button>
            <button class="tab-btn" data-tab="register">Inscription</button>
        </div>
    </div>

    <!-- INFO AREA -->
    <div id="infoArea" class="info-area info-info">
        <div class="info-content">
            <i class="fas fa-info-circle" id="infoIcon"></i>
            <span id="infoMessage">Bienvenue. Connectez-vous ou créez un compte.</span>
        </div>
        <div id="infoProgress" class="info-progress" style="display: none;">
            <div class="progress-fill"></div>
        </div>
    </div>

    <!-- FORMULAIRES -->
    <div class="forms-container">
        <!-- CONNEXION -->
        <div id="loginForm" class="form-card active">
            <h2>Connexion</h2>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="current-password">
                <button type="button" class="toggle-password" data-target="loginPassword">
                    <i class="fa-regular fa-eye"></i>
                </button>
            </div>
            <div class="form-footer">
                <a href="#" id="forgotPasswordLink" class="forgot-link">Mot de passe oublié ?</a>
            </div>
            <button id="doLoginBtn" class="btn-primary">Se connecter</button>
        </div>

        <!-- INSCRIPTION (4 étapes : Email, Mot de passe, Pseudo, Nom du marché) -->
        <div id="registerForm" class="form-card">
            <!-- Étape 1 : Email -->
            <div id="step1" class="step active">
                <h2>Email</h2>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="Votre email" autocomplete="email">
                </div>
            </div>

            <!-- Étape 2 : Mot de passe -->
            <div id="step2" class="step">
                <h2>Mot de passe</h2>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Mot de passe">
                    <button type="button" class="toggle-password" data-target="regPassword">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <div class="input-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="regConfirmPassword" placeholder="Confirmer">
                    <button type="button" class="toggle-password" data-target="regConfirmPassword">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <div id="passwordStrength" class="strength-box"></div>
            </div>

            <!-- Étape 3 : Pseudo -->
            <div id="step3" class="step">
                <h2>Pseudo</h2>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regUsername" placeholder="Nom d'utilisateur">
                </div>
            </div>

            <!-- Étape 4 : Nom du marché -->
            <div id="step4" class="step">
                <h2>Nom du marché</h2>
                <div class="input-group">
                    <i class="fas fa-store"></i>
                    <input type="text" id="regMarketName" placeholder="Nom de votre marché">
                </div>
                <div class="info-note">Vous pourrez compléter les autres informations (téléphone, ville, WhatsApp, etc.) dans les paramètres après connexion.</div>
            </div>

            <div class="step-nav">
                <button id="prevBtn" class="step-btn prev">Précédent</button>
                <button id="nextBtn" class="step-btn next">Suivant</button>
            </div>
        </div>

        <!-- MOT DE PASSE OUBLIÉ -->
        <div id="forgotForm" class="form-card">
            <h2>Réinitialisation</h2>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="forgotEmail" placeholder="Votre email">
            </div>
            <button id="resetPasswordBtn" class="btn-primary">Envoyer</button>
            <a href="#" id="backToLoginLink" class="back-link">Retour</a>
        </div>
    </div>
</div>

<!-- MODALE CHARGEMENT -->
<div id="loadingModal" class="modal-loading" style="display: none;">
    <div class="modal-card">
        <div class="spinner"></div>
        <p id="modalStatus">Chargement...</p>
    </div>
</div>

<!-- SUPABASE SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/auth.js"></script>
</body>
</html>
